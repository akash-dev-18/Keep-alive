
services:

  postgres:
    image: postgres:17-alpine
    container_name: uptime-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: uptime_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Data delete na ho container band hone par
    networks:
      - uptime-network
    restart: always


  redis:
    image: redis:alpine
    container_name: uptime-redis
    ports:
      - "6379:6379"
    networks:
      - uptime-network
    restart: always


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uptime-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATASOURCE_URL=jdbc:postgresql://postgres:5432/uptime_monitor
      - REDIS_HOST=redis
    restart: always
    networks:
      - uptime-network
    depends_on:
      - postgres
      - redis


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: uptime-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
    networks:
      - uptime-network
    depends_on:
      - backend


volumes:
  postgres_data:

networks:
  uptime-network:
    driver: bridge