spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/uptime_monitor}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  threads:
    virtual:
      enabled: true

clerk:
  jwks-uri: ${CLERK_JWKS_URI}
  issuer: ${CLERK_ISSUER}
  webhook-secret: ${CLERK_WEBHOOK_SECRET}

resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL}

stripe:
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}

keepalive:
  encryption-secret: ${KEEPALIVE_ENCRYPTION_SECRET}